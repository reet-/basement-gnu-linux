inherit: [autotools]

metaEnvironment:
   PKG_VERSION: "4.2"

checkoutSCM:
   scm: url
   url: https://github.com/dosfstools/dosfstools/releases/download/v4.2/dosfstools-${PKG_VERSION}.tar.gz
   digestSHA256: 64926eebf90092dca21b14259a5301b7b98e7b1943e8a201c7d726084809b527
   stripComponents: 1

buildTools: [gettext]
buildScript: |
   autotoolsBuild $1 --enable-compat-symlinks

packageScript: |
   autotoolsPackageTgt

provideTools:
   dosfstools: "usr/sbin"
