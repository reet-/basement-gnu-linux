inherit: [meson]

metaEnvironment:
    PKG_VERSION: "2023.2"
    PKG_DESCRIPTION: "X Window System Unified Protocol"
    PKG_LICENSE: "X11 AND MIT"

checkoutSCM:
    scm: git
    url: https://gitlab.freedesktop.org/xorg/proto/xorgproto.git
    branch: master
    commit: 1c8128d72df22843a2022576850bc5ab5e3a46ea

buildTools: [host-toolchain]
buildScript: |
   mesonBuild $1 --datadir=lib -Dlegacy=true

multiPackage:
   dev:
      packageScript: mesonPackageDev
   tgt:
      packageScript: mesonPackageTgt
